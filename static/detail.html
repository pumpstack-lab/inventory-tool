<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>受払履歴</title>
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>

<header class="header">
  <div>
    <h1 id="page-title">受払履歴</h1>
    <div class="header-sub" id="page-sub">読み込み中…</div>
  </div>
  <div class="header-actions">
    <a href="/" class="btn btn-ghost btn-sm">← 一覧</a>
  </div>
</header>

<main class="wrap">
  <!-- サマリ -->
  <div class="card" style="padding:16px;margin-bottom:16px">
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;text-align:center">
      <div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px">現在庫</div>
        <div style="font-size:24px;font-weight:800" id="detail-stock">―</div>
      </div>
      <div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px">週平均払出</div>
        <div style="font-size:20px;font-weight:800" id="detail-avg">―</div>
      </div>
      <div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px">残余週数</div>
        <div style="font-size:20px;font-weight:800" id="detail-weeks">―</div>
      </div>
    </div>
  </div>

  <!-- 週平均デフォルト変更 + エクセル出力 -->
  <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span style="font-size:13px;color:var(--muted)">週平均目安：</span>
      <input type="number" id="avg-input" min="0" step="0.1" style="width:80px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:14px" disabled />
      <span style="font-size:13px;color:var(--muted)" id="avg-unit"></span>
      <button class="btn btn-accent btn-sm" id="btn-save-avg" onclick="saveDefaultAvg()" disabled>保存</button>
    </div>
    <!-- bug14: ロード完了前はdisabledにしておく -->
    <button class="btn btn-ghost btn-sm" id="btn-csv" onclick="exportCSV()" disabled>📥 CSV出力（Excel対応）</button>
  </div>

  <!-- 履歴テーブル -->
  <div class="card">
    <div class="history-table-wrap">
      <table class="history-table">
        <thead>
          <tr>
            <th>日時</th>
            <th>区分</th>
            <th>数量</th>
            <th>担当者</th>
            <th>メモ</th>
          </tr>
        </thead>
        <tbody id="tx-tbody">
          <tr><td colspan="5" style="text-align:center;padding:24px;color:var(--muted)">読み込み中…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<script>
const params = new URLSearchParams(location.search);
const itemId = params.get("id");
let txData = [];
let itemInfo = null;
let displayName = "受払履歴";

async function init() {
  if (!itemId) { document.getElementById("page-sub").textContent = "品目IDが指定されていません"; return; }

  const [itemsRes, txRes] = await Promise.all([
    fetch("/api/items"),
    fetch(`/api/transactions?item_id=${itemId}&limit=500`),
  ]);
  const itemsData = await itemsRes.json();
  const txJson = await txRes.json();

  // bug2: active=0（削除済み）の品目もtransactionsのitem_nameから取得して対応
  itemInfo = (itemsData.items || []).find(i => i.id === itemId);
  txData = txJson.transactions || [];

  // 削除済み品目でも履歴のitem_nameから名前を取得して表示する
  displayName = itemInfo?.name || txData[0]?.item_name || "削除済み品目";
  const unit = itemInfo?.unit || "";

  document.title = `${displayName}｜受払履歴`;
  document.getElementById("page-title").textContent = displayName;
  document.getElementById("page-sub").textContent = itemInfo ? "受払履歴" : "受払履歴（削除済み品目）";

  if (itemInfo) {
    document.getElementById("detail-stock").textContent = `${itemInfo.current_stock}${unit}`;
    const avg = itemInfo.weekly_avg;
    document.getElementById("detail-avg").textContent = avg > 0 ? `${avg.toFixed(1)}${unit}/週` : "―";
    document.getElementById("detail-weeks").textContent = avg > 0 ? `${Math.floor(itemInfo.current_stock / avg)}週` : "―";

    // 問題2: 週平均デフォルト変更UI を有効化
    const avgInput = document.getElementById("avg-input");
    avgInput.value = itemInfo.default_weekly_avg || 0;
    avgInput.disabled = false;
    document.getElementById("avg-unit").textContent = unit + "/週";
    document.getElementById("btn-save-avg").disabled = false;
  } else {
    document.getElementById("detail-stock").textContent = "―";
    document.getElementById("detail-avg").textContent = "―";
    document.getElementById("detail-weeks").textContent = "―";
  }

  // bug14: ロード完了後にCSVボタンを有効化
  document.getElementById("btn-csv").disabled = false;

  renderTable();
}

async function saveDefaultAvg() {
  const val = parseFloat(document.getElementById("avg-input").value || "0");
  if (val < 0) { alert("0以上の数値を入力してください"); return; }
  const res = await fetch(`/api/items/${itemId}`, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ default_weekly_avg: val }),
  });
  if (!res.ok) { const d = await res.json(); alert(d.error || "保存に失敗しました"); return; }
  const btn = document.getElementById("btn-save-avg");
  btn.textContent = "✓ 保存済み";
  setTimeout(() => { btn.textContent = "保存"; }, 2000);
}

function renderTable() {
  const tbody = document.getElementById("tx-tbody");
  if (!txData.length) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--muted)">履歴がありません</td></tr>`;
    return;
  }
  tbody.innerHTML = txData.map(tx => {
    const typeLabel = tx.type === "in"
      ? `<span class="tx-in">入庫</span>`
      : `<span class="tx-out">払出</span>`;
    const qty = tx.type === "in"
      ? `<span class="tx-in">+${tx.quantity}</span>`
      : `<span class="tx-out">-${tx.quantity}</span>`;
    const dt = tx.recorded_at.slice(0, 16).replace("T", " ");
    return `<tr>
      <td style="white-space:nowrap">${dt}</td>
      <td>${typeLabel}</td>
      <td>${qty}</td>
      <td>${escHtml(tx.staff_name || "―")}</td>
      <td>${escHtml(tx.note || "")}</td>
    </tr>`;
  }).join("");
}

function exportCSV() {
  const name = itemInfo?.name || "item";
  const unit = itemInfo?.unit || "";
  const rows = [["日時", "区分", `数量(${unit})`, "担当者", "メモ"]];
  txData.forEach(tx => {
    rows.push([
      tx.recorded_at.slice(0, 16).replace("T", " "),
      tx.type === "in" ? "入庫" : "払出",
      tx.type === "in" ? tx.quantity : -tx.quantity,
      tx.staff_name || "",
      tx.note || "",
    ]);
  });
  const bom = "﻿";
  const csv = bom + rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(",")).join("\r\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  // bug3: 括弧・記号をファイル名から除去してOS互換性を確保
  const safeName = displayName.replace(/[\\/:*?"<>|()（）]/g, "_");
  a.download = `${safeName}_受払履歴_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  // 非同期ダウンロードが完了してから解放（早すぎると一部ブラウザで失敗）
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function escHtml(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

init();
</script>
</body>
</html>
